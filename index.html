<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, pink, #00b4d8);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .profile-card {
      background-color: #ffffff;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      padding: 30px 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    .profile-image {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0077b6;
      margin-bottom: 15px;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 600;
      color: #0077b6;
      margin-bottom: 8px;
      transition: color 0.3s ease;
      cursor: pointer;
    }

    .bio {
      font-size: 15px;
      color: #333;
      margin-bottom: 15px;
    }

    .toggle-btn {
      background-color: #0077b6;
      color: #fff;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 15px;
      transition: background 0.3s ease;
    }

    .toggle-btn:hover {
      background-color: #023e8a;
    }

    .hobbies {
      display: none;
      list-style: none;
      margin-bottom: 15px;
      padding-left: 0;
    }

    .hobbies li {
      margin: 5px 0;
      color: #0077b6;
    }

    .social-links a {
      text-decoration: none;
      color: #fff;
      background-color: #00b4d8;
      padding: 8px 12px;
      margin: 0 5px;
      border-radius: 50px;
      display: inline-block;
      transition: background 0.3s ease;
    }

    .social-links a:hover {
      background-color: #0077b6;
    }

    @media (max-width: 480px) {
      .profile-card {
        padding: 20px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img src="img.jpg" alt="Profile Image" class="profile-image" />
    <div class="profile-name" id="name">KEERTHIKA BADRI</div>
    <p class="bio">Aspiring web developer passionate about building responsive interfaces.</p>

    <button class="toggle-btn" onclick="toggleHobbies()">Hobbies</button>

    <ul class="hobbies" id="hobbyList">
      <li>Coding</li>
      <li>Reading</li>
      <li>Traveling</li>
    </ul>

    <div class="social-links">
      <a href="https://www.linkedin.com/in/badri-keerthika/" target="_blank">LinkedIn</a>
      <a href="https://github.com/keerthika0909" target="_blank">GitHub</a>
    </div>
  </div>

  <script>
    function toggleHobbies() {
      const hobbies = document.getElementById('hobbyList');
      hobbies.style.display = hobbies.style.display === 'block' ? 'none' : 'block';
    }

    const nameElement = document.getElementById('name');
    nameElement.addEventListener('mouseover', () => {
      nameElement.style.color = '#ff6f61';
    });

    nameElement.addEventListener('mouseout', () => {
      nameElement.style.color = '#0077b6';
    });
  </script>
</body>
</html>
