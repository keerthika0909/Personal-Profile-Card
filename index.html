<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Traditional Profile Card</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(to bottom right, #fceabb, #f8b500);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-card {
      background-color: #fff8e1;
      border: 5px double #8b4513;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      padding: 30px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .profile-image {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #a0522d;
      margin-bottom: 15px;
    }

    .profile-name {
      font-size: 24px;
      font-weight: bold;
      color: #4e2600;
      margin-bottom: 8px;
      transition: color 0.3s ease;
      cursor: pointer;
    }

    .bio {
      font-size: 15px;
      color: #5c3d0b;
      margin-bottom: 15px;
    }

    .toggle-btn {
      background-color: #a0522d;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .toggle-btn:hover {
      background-color: #7b3411;
    }

    .hobbies {
      display: none;
      list-style: none;
      margin-bottom: 15px;
    }

    .hobbies li {
      margin: 5px 0;
      color: #6b2e00;
    }

    .social-links a {
      text-decoration: none;
      color: #fff;
      background-color: #a0522d;
      padding: 8px 12px;
      margin: 0 5px;
      border-radius: 20px;
      display: inline-block;
    }

    .social-links a:hover {
      background-color: #5c2c06;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img src="img.jpg" alt="Profile Image" class="profile-image" />
    <div class="profile-name" id="name">KEERTHIKA BADRI</div>
    <p class="bio">Traditional coder with modern dreams 🌿</p>

    <button class="toggle-btn" onclick="toggleHobbies()">Hobbies</button>

    <ul class="hobbies" id="hobbyList">
      <li>Coding</li>
      <li>Reading Scriptures</li>
      <li>Village Travel</li>
    </ul>

    <div class="social-links">
      <a href="https://www.linkedin.com/in/badri-keerthika/" target="_blank">LinkedIn</a>
      <a href="https://github.com/keerthika0909" target="_blank">GitHub</a>
    </div>
  </div>

  <script>
    function toggleHobbies() {
      const hobbies = document.getElementById('hobbyList');
      hobbies.style.display = hobbies.style.display === 'block' ? 'none' : 'block';
    }

    const nameElement = document.getElementById('name');
    nameElement.addEventListener('mouseover', () => {
      nameElement.style.color = '#d2691e';
    });
    nameElement.addEventListener('mouseout', () => {
      nameElement.style.color = '#4e2600';
    });
  </script>
</body>
</html>
